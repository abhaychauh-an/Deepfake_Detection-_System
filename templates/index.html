<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Deepfake Detector</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

.container {
    margin-top: 80px;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 30px;
    border-radius: 15px;
    display: inline-block;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

h1 {
    margin-bottom: 20px;
}

input[type="file"] {
    margin: 15px 0;
    padding: 10px;
    background: #1f1f1f;
    color: white;
    border: none;
    border-radius: 8px;
}

button {
    background: #00adb5;
    border: none;
    padding: 12px 25px;
    color: white;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00cfd1;
}

.result {
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
}

.real {
    color: #00ff9d;
}

.fake {
    color: #ff4c4c;
}

img {
    margin-top: 15px;
    max-width: 250px;
    border-radius: 10px;
}

.link {
    display: block;
    margin-top: 20px;
    color: #00adb5;
    text-decoration: none;
}
</style>

<script>
function previewImage(event) {
    const img = document.getElementById("preview");
    img.src = URL.createObjectURL(event.target.files[0]);
    img.style.display = "block";
}
</script>

</head>

<body>

<div class="container">
<div class="card">

<h1>🤖 AI Deepfake Detection</h1>

<form method="POST" enctype="multipart/form-data">
<input type="file" name="image" accept="image/*" onchange="previewImage(event)" required>
<br>
<img id="preview" style="display:none;">
<br><br>
<button type="submit">Analyze Image</button>
</form>

{% if prediction %}
<div class="result 
{% if 'Real' in prediction %}real{% else %}fake{% endif %}">
{{ prediction }}
</div>
{% endif %}

<a href="/history" class="link">📊 View History</a>

</div>
</div>

</body>
</html>
